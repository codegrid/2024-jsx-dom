<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      input {
        font-size: 16px;
        padding: 8px;
        width: 300px;
        border: 2px solid #ddd;
        border-radius: 4px;
        transition: none;
      }
      input:focus {
        outline: none;
        border-color: #4a90e2;
        animation: focusGlow 0.3s ease-in-out;
      }
      @keyframes focusGlow {
        0% {
          box-shadow: 0 0 0 0 rgba(74, 144, 226, 0.4);
          transform: scale(1);
        }
        50% {
          box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.2);
          transform: scale(1.02);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(74, 144, 226, 0);
          transform: scale(1);
        }
      }
      p {
        font-size: 18px;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="dist/index.js"></script>
  </body>
</html>
